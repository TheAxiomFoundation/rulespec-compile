- name: snap_eligible
  kind: derived
  entity: Household
  period: Month
  dtype: Boolean
  label: SNAP Eligibility
  source: 7 USC 2017
  versions:
  - effective_from: '2025-01-01'
    formula: |-
      # Simplified eligibility: gross income below limit
      hh = min(household_size, 8)
      gross_limit = gross_income_limit[hh]
      return gross_income <= gross_limit
- name: snap_benefit
  kind: derived
  entity: Household
  period: Month
  dtype: Money
  label: SNAP Monthly Benefit
  source: 7 USC 2017
  versions:
  - effective_from: '2025-01-01'
    formula: |-
      hh = min(household_size, 8)

      # Get max allotment for household size
      max_benefit = max_allotment[hh]

      # Calculate net income (gross - standard deduction)
      std_deduction = standard_deduction[hh]
      net_income = max(0, gross_income - std_deduction)

      # Check net income eligibility
      net_limit = net_income_limit[hh]
      is_eligible = net_income <= net_limit

      # Benefit = max allotment - 30% of net income
      reduction = net_income * benefit_reduction_rate[0] / 100
      benefit = max(0, max_benefit - reduction)

      # Minimum benefit for 1-2 person households
      min_benefit = hh <= 2 ? 23 : 0

      return is_eligible ? round(max(benefit, min_benefit)) : 0
