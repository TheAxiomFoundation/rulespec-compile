  period: Year
  dtype: Integer
  default: 0

earned_income_amount:
  source: "26 USC 32(b)(2)(A) earned income amount"

phaseout_amount:
  source: "26 USC 32(b)(2)(A) phaseout amount"

eitc_pair_total:
