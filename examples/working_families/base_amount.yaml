# Example Working Families Act § 101

source:
  citation: "Example Working Families Act § 101"
  accessed: 2025-01-01

from "./phase_in_rate.yaml" import rate
from "./phase_in_cap.yaml" import cap

export base_amount

base_amount:
  entity: TaxUnit
  period: Year
  dtype: Money
  label: "Base Working Families Benefit"
  from 2025-01-01:
    return min(earned_income * rate, cap)
